<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banana Empire: xeoni7 Edition</title>
    
    <script src="https://omg10.com/4/10948390"></script>

    <style>
        :root {
            --yellow: #f1c40f; --purple: #9b59b6; --green: #2ecc71;
            --dark: #0a0a0a; --card: rgba(255,255,255,0.08);
        }
        body { 
            text-align: center; font-family: 'Segoe UI', sans-serif; 
            background: var(--dark); color: white; margin: 0; padding: 10px;
            user-select: none; touch-action: manipulation;
        }
        .header { background: var(--card); padding: 20px; border-radius: 25px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .score { font-size: 50px; color: var(--yellow); font-weight: 900; }
        
        #banana-container { height: 200px; display: flex; align-items: center; justify-content: center; position: relative; }
        #banana { width: 170px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        #banana:active { transform: scale(0.85); }

        .btn-main { width: 100%; max-width: 320px; padding: 15px; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; margin-bottom: 8px; font-size: 14px; }
        .btn-donate { background: linear-gradient(45deg, #8e44ad, #9b59b6); color: white; box-shadow: 0 5px 15px rgba(155, 89, 182, 0.3); }
        .btn-ad { background: #ff4757; color: white; }

        .section-title { text-align: left; padding: 15px 0 5px 10px; font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Улучшения (Баффы) */
        .upgrade-card { 
            background: var(--card); margin: 5px 10px; padding: 15px; border-radius: 20px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .upgrade-info b { display: block; font-size: 16px; color: #fff; }
        .upgrade-info span { font-size: 12px; color: var(--green); font-weight: bold; }
        .btn-buy { background: #222; color: white; border: 1px solid #444; padding: 10px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-buy:active { background: #333; }

        /* Скины */
        .skin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; padding-bottom: 50px; }
        .skin-card { background: var(--card); padding: 10px; border-radius: 15px; border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .skin-card.active { border-color: var(--yellow); background: rgba(241,196,15,0.1); }
        .skin-card img { width: 45px; height: 45px; }

        /* Эффекты скинов */
        .s-ice { filter: hue-rotate(180deg) brightness(1.2) drop-shadow(0 0 5px #3498db); }
        .s-fire { filter: hue-rotate(330deg) saturate(2) drop-shadow(0 0 5px #e67e22); }
        .s-gold { filter: brightness(1.1) sepia(1) saturate(8) drop-shadow(0 0 8px #f1c40f); }
        .s-neon { filter: hue-rotate(290deg) saturate(3) drop-shadow(0 0 10px #ff00ff); }
        .s-rainbow { animation: rainbow 4s infinite linear; }
        @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        
        .floating-num { position: absolute; color: var(--yellow); font-weight: bold; font-size: 24px; pointer-events: none; animation: floatUp 0.7s forwards; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div class="header">
        <div id="vip-tag" style="color:var(--purple); font-weight:bold; font-size:12px; display:none;">★ VIP xeoni7 x2 ★</div>
        <div class="score"><span id="score">0</span> 🍌</div>
        <div style="font-size: 12px; color: #888; margin-top:5px;">Клик: +<b id="c-power">1</b> | В сек: +<b id="a-power">0</b></div>
    </div>

    <div id="banana-container">
        <img id="banana" src="https://img.icons8.com/emoji/256/banana-emoji.png" onclick="doClick(event)">
    </div>

    <button class="btn-main btn-donate" onclick="doDonate()">💜 ПОДДЕРЖАТЬ xeoni7 (VIP X2)</button>
    <button class="btn-main btn-ad" onclick="doAd()">📺 БОНУС +100 🍌</button>

    <div class="section-title">Прокачка (Баффы)</div>
    <div class="upgrade-card">
        <div class="upgrade-info"><b>💪 Сильный Клик</b><span id="u-cost">Цена: 15</span></div>
        <button class="btn-buy" onclick="buyClick()">УЛУЧШИТЬ</button>
    </div>
    <div class="upgrade-card">
        <div class="upgrade-info"><b>🤖 Авто-ферма</b><span id="a-cost">Цена: 50</span></div>
        <button class="btn-buy" onclick="buyAuto()">КУПИТЬ</button>
    </div>

    <div class="section-title">Магазин скинов</div>
    <div class="skin-grid" id="skin-shop"></div>

<script>
    const DONATE_LINK = "https://www.donationalerts.com/r/xeoni7";

    // --- Система сохранений ---
    function save(k, v) {
        localStorage.setItem(k, v);
        let d = new Date(); d.setTime(d.getTime() + (365*24*60*60*1000));
        document.cookie = k + "=" + v + "; expires=" + d.toUTCString() + "; path=/";
    }
    function load(k) {
        let r = localStorage.getItem(k);
        if (r) return r;
        let n = k + "=";
        let ca = document.cookie.split(';');
        for(let i=0; i<ca.length; i++) {
            let c = ca[i].trim();
            if (c.indexOf(n) == 0) return c.substring(n.length, c.length);
        }
        return null;
    }

    // --- Переменные игры ---
    let score = parseFloat(load('x_sc')) || 0;
    let clickPower = parseInt(load('x_cp')) || 1;
    let autoPower = parseInt(load('x_ap')) || 0;
    let clickCost = parseInt(load('x_cc')) || 15;
    let autoCost = parseInt(load('x_ac')) || 50;
    let isVip = load('x_vip') === 'true';
    let ownedSkins = JSON.parse(load('x_own')) || [0];
    let activeSkin = parseInt(load('x_act')) || 0;

    const skins = [
        { n: "Обычный", p: 0, c: "" },
        { n: "Лёд", p: 500, c: "s-ice" },
        { n: "Огонь", p: 2500, c: "s-fire" },
        { n: "Неон", p: 10000, c: "s-neon" },
        { n: "Золото", p: 50000, c: "s-gold" },
        { n: "Радуга", p: 150000, c: "s-rainbow" }
    ];

    // --- Логика ---
    function doClick(e) {
        let p = isVip ? (clickPower * 2) : clickPower;
        score += p;
        
        let n = document.createElement('div');
        n.className = 'floating-num'; n.innerText = '+' + p;
        n.style.left = e.pageX + 'px'; n.style.top = e.pageY + 'px';
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 700);
        render();
    }

    function buyClick() {
        if (score >= clickCost) {
            score -= clickCost; clickPower++;
            clickCost = Math.round(clickCost * 1.6);
            render();
        }
    }

    function buyAuto() {
        if (score >= autoCost) {
            score -= autoCost; autoPower++;
            autoCost = Math.round(autoCost * 1.7);
            render();
        }
    }

    function buySkin(id) {
        if (ownedSkins.includes(id)) { activeSkin = id; } 
        else if (score >= skins[id].p) {
            score -= skins[id].p; ownedSkins.push(id); activeSkin = id;
        }
        render();
    }

    function doDonate() {
        window.open(DONATE_LINK, "_blank");
        isVip = true;
        save('x_vip', 'true');
        render();
        alert("Спасибо за поддержку xeoni7! VIP Активирован (X2 клик)!");
    }

    function doAd() {
        window.open("https://omg10.com/4/10948390", "_blank");
        score += 100;
        render();
    }

    // Циклы
    setInterval(() => { if (autoPower > 0) { score += autoPower; render(); } }, 1000);
    setInterval(() => {
        save('x_sc', score); save('x_cp', clickPower); save('x_ap', autoPower);
        save('x_cc', clickCost); save('x_ac', autoCost);
        save('x_own', JSON.stringify(ownedSkins)); save('x_act', activeSkin);
    }, 3000);

    function render() {
        document.getElementById('score').innerText = Math.floor(score);
        document.getElementById('c-power').innerText = isVip ? (clickPower * 2) : clickPower;
        document.getElementById('a-power').innerText = autoPower;
        document.getElementById('u-cost').innerText = "Цена: " + clickCost;
        document.getElementById('a-cost').innerText = "Цена: " + autoCost;
        document.getElementById('banana').className = skins[activeSkin].c;
        document.getElementById('vip-tag').style.display = isVip ? 'block' : 'none';

        let html = '';
        skins.forEach((s, i) => {
            let isOwned = ownedSkins.includes(i);
            html += `<div class="skin-card ${activeSkin === i ? 'active' : ''}" onclick="buySkin(${i})">
                <img src="https://img.icons8.com/emoji/256/banana-emoji.png" class="${s.c}">
                <div style="font-size:9px; margin-top:5px; color:#aaa;">${isOwned ? 'ВЫБРАТЬ' : s.p + ' 🍌'}</div>
            </div>`;
        });
        document.getElementById('skin-shop').innerHTML = html;
    }

    render();
</script>
</body>
</html>
