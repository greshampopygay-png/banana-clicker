<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banana Empire: xeoni7 Official</title>
    
    <script src="https://omg10.com/4/10948390"></script>

    <style>
        :root {
            --yellow: #f1c40f; --purple: #9b59b6; --blue: #3498db; --green: #2ecc71;
            --dark: #0f0f0f; --card: rgba(255,255,255,0.06);
        }
        
        body { 
            text-align: center; font-family: 'Segoe UI', sans-serif; 
            background: var(--dark); color: white; margin: 0; padding: 15px;
            user-select: none; touch-action: manipulation; overflow-x: hidden;
        }

        /* Статистика */
        .stats-box { 
            background: var(--card); padding: 20px; border-radius: 25px; 
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        .score-val { font-size: 52px; color: var(--yellow); font-weight: 900; display: block; }
        .sub-stats { font-size: 13px; color: #888; margin-top: 5px; }
        .vip-badge { color: var(--purple); font-weight: bold; font-size: 14px; display: none; margin-bottom: 5px; }

        /* Игровое поле */
        #game-area { height: 220px; display: flex; align-items: center; justify-content: center; position: relative; }
        #banana { 
            width: 170px; cursor: pointer; transition: transform 0.1s;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            z-index: 5;
        }
        #banana:active { transform: scale(0.85); }

        /* Кнопки */
        .btn {
            width: 100%; max-width: 340px; padding: 18px; border: none; border-radius: 20px;
            font-weight: 800; cursor: pointer; margin-bottom: 12px; font-size: 15px; transition: 0.3s;
        }
        .btn-don { background: linear-gradient(45deg, #8e44ad, #9b59b6); color: white; box-shadow: 0 4px 15px rgba(155, 89, 182, 0.4); }
        .btn-ads { background: #ff4757; color: white; }

        /* Магазин улучшений */
        .title { text-align: left; padding: 10px 0 10px 10px; font-size: 14px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .upg-card { 
            background: var(--card); margin-bottom: 10px; padding: 15px; border-radius: 20px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .upg-name { text-align: left; }
        .upg-name b { display: block; font-size: 17px; }
        .upg-name i { font-size: 12px; color: var(--green); font-style: normal; font-weight: bold; }
        .buy-btn { background: #252525; color: white; border: 1px solid #444; padding: 12px 20px; border-radius: 15px; font-weight: bold; }

        /* МАГАЗИН СКИНОВ (РАБОЧИЕ ФИЛЬТРЫ) */
        .skin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 10px; padding-bottom: 40px; }
        .skin-item { 
            background: var(--card); padding: 12px; border-radius: 20px; 
            border: 2px solid transparent; cursor: pointer; transition: 0.2s;
        }
        .skin-item.active { border-color: var(--yellow); background: rgba(241,196,15,0.1); }
        .skin-img { width: 50px; height: 50px; margin-bottom: 5px; }
        .skin-price { font-size: 10px; color: #aaa; font-weight: bold; }

        /* КЛАССЫ СКИНОВ */
        .skin-classic { filter: none !important; }
        .skin-ice { filter: hue-rotate(180deg) brightness(1.4) saturate(1.5) drop-shadow(0 0 10px var(--blue)) !important; }
        .skin-fire { filter: hue-rotate(330deg) saturate(3) brightness(1.2) drop-shadow(0 0 10px #e67e22) !important; }
        .skin-neon { filter: hue-rotate(280deg) saturate(4) brightness(1.3) drop-shadow(0 0 15px #ff00ff) !important; }
        .skin-gold { filter: brightness(1.1) sepia(1) saturate(10) contrast(1.2) drop-shadow(0 0 10px var(--yellow)) !important; }
        .skin-rainbow { animation: rainbowAnim 3s infinite linear !important; }

        @keyframes rainbowAnim {
            0% { filter: hue-rotate(0deg) saturate(2); }
            100% { filter: hue-rotate(360deg) saturate(2); }
        }

        .float {
            position: absolute; color: var(--yellow); font-weight: bold; font-size: 26px;
            pointer-events: none; animation: floatUp 0.8s forwards; z-index: 10;
        }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body>

    <div class="stats-box">
        <div class="vip-badge" id="v-bad">★ VIP xeoni7 x2 ★</div>
        <span class="score-val" id="sc-val">0</span>
        <div class="sub-stats">
            За клик: +<span id="c-pw">1</span> | В секунду: +<span id="a-pw">0</span>
        </div>
    </div>

    <div id="game-area">
        <img id="banana" src="https://img.icons8.com/emoji/256/banana-emoji.png" class="skin-classic" onclick="handleBananaClick(event)">
    </div>

    <button class="btn btn-don" onclick="openDonate()">💜 ПОДДЕРЖАТЬ xeoni7 (VIP X2)</button>
    <button class="btn btn-ads" onclick="watchAdBonus()">📺 БОНУС +100 БАНАНОВ</button>

    <div class="title">Улучшения</div>
    <div class="upg-card">
        <div class="upg-name"><b>💪 Качалка пальцев</b><i id="c-cost">Цена: 15</i></div>
        <button class="buy-btn" onclick="buyUpgrade('click')">КУПИТЬ</button>
    </div>
    <div class="upg-card">
        <div class="upg-name"><b>🤖 Банано-бот</b><i id="a-cost">Цена: 50</i></div>
        <button class="buy-btn" onclick="buyUpgrade('auto')">КУПИТЬ</button>
    </div>

    <div class="title">Скины (Выбирай любой)</div>
    <div class="skin-grid" id="skin-shop"></div>

<script>
    const DONATE_URL = "https://www.donationalerts.com/r/xeoni7";

    // Данные игры
    let game = {
        score: parseFloat(localStorage.getItem('x_sc')) || 0,
        clickPower: parseInt(localStorage.getItem('x_cp')) || 1,
        autoPower: parseInt(localStorage.getItem('x_ap')) || 0,
        clickCost: parseInt(localStorage.getItem('x_cc')) || 15,
        autoCost: parseInt(localStorage.getItem('x_ac')) || 50,
        isVip: localStorage.getItem('x_vip') === 'true',
        ownedSkins: JSON.parse(localStorage.getItem('x_own')) || [0],
        activeSkin: parseInt(localStorage.getItem('x_act')) || 0
    };

    const skinList = [
        { n: "Классик", p: 0, cls: "skin-classic" },
        { n: "Лёд", p: 500, cls: "skin-ice" },
        { n: "Огонь", p: 2500, cls: "skin-fire" },
        { n: "Неон", p: 10000, cls: "skin-neon" },
        { n: "Золото", p: 50000, cls: "skin-gold" },
        { n: "Радуга", p: 150000, cls: "skin-rainbow" }
    ];

    function saveGame() {
        localStorage.setItem('x_sc', game.score);
        localStorage.setItem('x_cp', game.clickPower);
        localStorage.setItem('x_ap', game.autoPower);
        localStorage.setItem('x_cc', game.clickCost);
        localStorage.setItem('x_ac', game.autoCost);
        localStorage.setItem('x_vip', game.isVip);
        localStorage.setItem('x_own', JSON.stringify(game.ownedSkins));
        localStorage.setItem('x_act', game.activeSkin);
    }

    function handleBananaClick(e) {
        let p = game.isVip ? game.clickPower * 2 : game.clickPower;
        game.score += p;
        
        let f = document.createElement('div');
        f.className = 'float'; f.innerText = '+' + p;
        f.style.left = e.pageX + 'px'; f.style.top = e.pageY + 'px';
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 800);
        updateUI();
    }

    function buyUpgrade(type) {
        if (type === 'click' && game.score >= game.clickCost) {
            game.score -= game.clickCost; game.clickPower++;
            game.clickCost = Math.round(game.clickCost * 1.6);
        } else if (type === 'auto' && game.score >= game.autoCost) {
            game.score -= game.autoCost; game.autoPower++;
            game.autoCost = Math.round(game.autoCost * 1.7);
        }
        updateUI();
    }

    function selectSkin(id) {
        if (game.ownedSkins.includes(id)) {
            game.activeSkin = id;
        } else if (game.score >= skinList[id].p) {
            game.score -= skinList[id].p;
            game.ownedSkins.push(id);
            game.activeSkin = id;
        }
        updateUI();
    }

    function openDonate() {
        window.open(DONATE_URL, "_blank");
        game.isVip = true;
        updateUI();
        alert("xeoni7 благодарит тебя! VIP x2 активирован!");
    }

    function watchAdBonus() {
        window.open("https://omg10.com/4/10948390", "_blank");
        game.score += 100;
        updateUI();
    }

    function updateUI() {
        document.getElementById('sc-val').innerText = Math.floor(game.score);
        document.getElementById('c-pw').innerText = game.isVip ? game.clickPower * 2 : game.clickPower;
        document.getElementById('a-pw').innerText = game.autoPower;
        document.getElementById('c-cost').innerText = "Цена: " + game.clickCost;
        document.getElementById('a-cost').innerText = "Цена: " + game.autoCost;
        document.getElementById('v-bad').style.display = game.isVip ? 'block' : 'none';

        // Применяем скин
        let b = document.getElementById('banana');
        b.className = skinList[game.activeSkin].cls;

        // Обновляем магазин
        let html = '';
        skinList.forEach((s, i) => {
            let owned = game.ownedSkins.includes(i);
            html += `<div class="skin-item ${game.activeSkin === i ? 'active' : ''}" onclick="selectSkin(${i})">
                <img src="https://img.icons8.com/emoji/256/banana-emoji.png" class="skin-img ${s.cls}">
                <div class="skin-price">${owned ? 'ВЫБРАТЬ' : s.p}</div>
            </div>`;
        });
        document.getElementById('skin-shop').innerHTML = html;
        saveGame();
    }

    // Автоклик
    setInterval(() => { if (game.autoPower > 0) { game.score += game.autoPower; updateUI(); } }, 1000);
    // Резервное сохранение
    setInterval(saveGame, 5000);

    updateUI();
</script>
</body>
</html>
