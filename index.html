<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banana Clicker: Skins Edition</title>

    <script src="https://omg10.com/4/10948390"></script>

    <style>
        body { text-align: center; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .stat-box { background: #333; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .score { font-size: 32px; color: #f1c40f; font-weight: bold; }
        
        #banana { 
            width: 200px; height: 200px; cursor: pointer; transition: 0.1s; 
            filter: drop-shadow(0 0 10px rgba(241, 196, 15, 0.5));
        }
        #banana:active { transform: scale(0.9); }

        .section { margin-top: 30px; background: #252525; padding: 15px; border-radius: 15px; }
        .skin-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 10px; }
        
        .skin-card { background: #444; padding: 10px; border-radius: 10px; width: 100px; border: 2px solid transparent; }
        .skin-card.active { border-color: #f1c40f; background: #555; }
        .skin-img { width: 60px; height: 60px; display: block; margin: 0 auto 5px; border-radius: 50%; }

        button { 
            padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; 
            transition: 0.3s; margin-top: 5px;
        }
        .btn-upgrade { background: #2ecc71; color: white; width: 100%; }
        .btn-ad { background: #e74c3c; color: white; font-size: 16px; padding: 15px 30px; margin-bottom: 20px; }
        button:disabled { background: #777; cursor: not-allowed; }

        /* Цвета скинов через фильтры, чтобы не искать картинки */
        .skin-normal { filter: none; }
        .skin-dark { filter: brightness(0.3) contrast(1.2); }
        .skin-green { filter: hue-rotate(90deg) saturate(1.5); }
        .skin-red { filter: hue-rotate(320deg) saturate(2); }
    </style>
</head>
<body>

    <div class="stat-box">
        <div class="score">🍌 <span id="score">0</span></div>
        <div>Сила клика: <span id="click-power">1</span></div>
    </div>

    <button class="btn-ad" onclick="watchAd()">📺 СМОТРЕТЬ РЕКЛАМУ (+50 🍌)</button>

    <br>
    <img id="banana" src="https://img.icons8.com/emoji/256/banana-emoji.png" class="skin-normal" alt="Banana">

    <div class="section">
        <h3>Прокачка клика</h3>
        <p>Цена: <span id="upgrade-cost">10</span> 🍌</p>
        <button class="btn-upgrade" id="buy-upgrade">Улучшить (+1 к клику)</button>
    </div>

    <div class="section">
        <h3>Редкие скины</h3>
        <div class="skin-container">
            <div class="skin-card active" id="skin0">
                <img src="https://img.icons8.com/emoji/256/banana-emoji.png" class="skin-img skin-normal">
                <span>Дефолт</span>
                <button onclick="selectSkin(0)">Выбрать</button>
            </div>
            <div class="skin-card" id="skin1">
                <img src="https://img.icons8.com/emoji/256/banana-emoji.png" class="skin-img skin-dark">
                <span>Тёмный</span>
                <button id="btn-skin1" onclick="buySkin(1, 100)">100 🍌</button>
            </div>
            <div class="skin-card" id="skin2">
                <img src="https://img.icons8.com/emoji/256/banana-emoji.png" class="skin-img skin-green">
                <span>Зелёный</span>
                <button id="btn-skin2" onclick="buySkin(2, 250)">250 🍌</button>
            </div>
            <div class="skin-card" id="skin3">
                <img src="https://img.icons8.com/emoji/256/banana-emoji.png" class="skin-img skin-red">
                <span>Красный</span>
                <button id="btn-skin3" onclick="buySkin(3, 500)">500 🍌</button>
            </div>
        </div>
    </div>

<script>
    let score = 0;
    let clickPower = 1;
    let upgradeCost = 10;
    let ownedSkins = [0]; // Массив купленных скинов

    const scoreDisplay = document.getElementById('score');
    const bananaImg = document.getElementById('banana');
    const upgradeBtn = document.getElementById('buy-upgrade');
    const costDisplay = document.getElementById('upgrade-cost');
    const powerDisplay = document.getElementById('click-power');

    // Клик
    bananaImg.addEventListener('click', () => {
        score += clickPower;
        updateDisplay();
    });

    // Функция просмотра рекламы
    function watchAd() {
        // Твоя ссылка вызывается автоматически скриптом в head, 
        // здесь мы имитируем вознаграждение за нажатие.
        alert("За просмотр рекламы вы получили 50 бананов!");
        score += 50;
        updateDisplay();
        
        // В реальности здесь можно вызвать скрипт Monetag принудительно, 
        // если использовать их формат 'In-Page Push' или 'On-Click'.
    }

    // Прокачка
    upgradeBtn.addEventListener('click', () => {
        if (score >= upgradeCost) {
            score -= upgradeCost;
            clickPower++;
            upgradeCost = Math.round(upgradeCost * 1.7);
            updateDisplay();
        }
    });

    // Покупка скина
    function buySkin(id, price) {
        if (score >= price) {
            score -= price;
            ownedSkins.push(id);
            document.getElementById('btn-skin' + id).innerText = "Выбрать";
            document.getElementById('btn-skin' + id).setAttribute("onclick", `selectSkin(${id})`);
            updateDisplay();
        } else {
            alert("Недостаточно бананов!");
        }
    }

    // Выбор скина
    function selectSkin(id) {
        const classes = ['skin-normal', 'skin-dark', 'skin-green', 'skin-red'];
        bananaImg.className = classes[id];
        
        // Визуально выделяем активную карточку
        for(let i=0; i<=3; i++) {
            document.getElementById('skin'+i).classList.remove('active');
        }
        document.getElementById('skin'+id).classList.add('active');
    }

    function updateDisplay() {
        scoreDisplay.innerText = score;
        costDisplay.innerText = upgradeCost;
        powerDisplay.innerText = clickPower;
        upgradeBtn.disabled = score < upgradeCost;
    }
</script>

</body>
</html>
