<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banana Empire: xeoni7 Official</title>
    <script src="https://omg10.com/4/10948390"></script>
    <style>
        :root { --yellow:#f1c40f; --purple:#9b59b6; --green:#2ecc71; --dark:#0f0f0f; --card:rgba(255,255,255,0.06); }
        body { text-align:center; font-family:'Segoe UI',sans-serif; background:var(--dark); color:white; margin:0; padding:15px; user-select:none; touch-action:manipulation; overflow-x:hidden; }
        .stats-box { background:var(--card); padding:20px; border-radius:25px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.1); }
        .score-val { font-size:52px; color:var(--yellow); font-weight:900; display:block; }
        .sub-stats { font-size:13px; color:#888; margin-top:5px; }
        .vip-badge { color:var(--purple); font-weight:bold; font-size:14px; display:none; margin-bottom:5px; }
        #game-area { height:220px; display:flex; align-items:center; justify-content:center; position:relative; }
        #banana { width:170px; cursor:pointer; transition:transform 0.1s; z-index:5; }
        #banana:active { transform:scale(0.85) !important; }
        .btn { width:100%; max-width:340px; padding:18px; border:none; border-radius:20px; font-weight:800; cursor:pointer; margin-bottom:12px; font-size:15px; transition:0.3s; }
        .btn-don { background:linear-gradient(45deg,#8e44ad,#9b59b6); color:white; box-shadow:0 4px 15px rgba(155,89,182,0.4); }
        .btn-ads { background:#ff4757; color:white; }
        .title { text-align:left; padding:10px 0 10px 10px; font-size:14px; color:#555; text-transform:uppercase; letter-spacing:1px; }
        .upg-card { background:var(--card); margin-bottom:10px; padding:15px; border-radius:20px; display:flex; justify-content:space-between; align-items:center; }
        .upg-name { text-align:left; }
        .upg-name b { display:block; font-size:17px; }
        .upg-name i { font-size:12px; color:var(--green); font-style:normal; font-weight:bold; }
        .buy-btn { background:#252525; color:white; border:1px solid #444; padding:12px 20px; border-radius:15px; font-weight:bold; cursor:pointer; }
        .skin-tabs { display:flex; gap:8px; margin-bottom:12px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
        .skin-tabs::-webkit-scrollbar { display:none; }
        .skin-tab { padding:8px 16px; border-radius:30px; border:none; font-weight:700; font-size:12px; cursor:pointer; white-space:nowrap; background:#1a1a1a; color:#888; }
        .skin-tab.active { color:#0f0f0f; }
        .skin-tab[data-cat="all"].active      { background:#f1c40f; }
        .skin-tab[data-cat="common"].active   { background:#aaa; }
        .skin-tab[data-cat="rare"].active     { background:#4fc3f7; }
        .skin-tab[data-cat="epic"].active     { background:#ab47bc; }
        .skin-tab[data-cat="legendary"].active{ background:linear-gradient(90deg,#f1c40f,#e67e22,#e74c3c); color:white; }
        .skin-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:5px; padding-bottom:40px; }
        .skin-item { background:var(--card); padding:12px; border-radius:20px; border:2px solid transparent; cursor:pointer; transition:0.2s; }
        .skin-item.active { border-color:var(--yellow); background:rgba(241,196,15,0.1); }
        .skin-img { width:50px; height:50px; margin-bottom:5px; }
        .skin-price { font-size:10px; color:#aaa; font-weight:bold; }
        .skin-label { font-size:12px; color:#ddd; font-weight:600; margin-bottom:3px; }
        .skin-rarity { font-size:9px; margin-bottom:4px; }
        .skin-rarity.common    { color:#aaa; }
        .skin-rarity.rare      { color:#4fc3f7; }
        .skin-rarity.epic      { color:#ab47bc; }
        .skin-rarity.legendary { background:linear-gradient(90deg,#f1c40f,#e67e22); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:800; }

        /* ====== СКИНЫ ====== */

        /* ОБЫЧНЫЕ */
        .skin-classic   { filter:none;                                                                                                   animation:aBob 2s infinite ease-in-out; }
        .skin-green     { filter:hue-rotate(60deg) saturate(1.5) brightness(1.1);                                                        animation:aBob 2.5s infinite ease-in-out; }
        .skin-overripe  { filter:hue-rotate(25deg) saturate(0.5) brightness(0.45);                                                       animation:aWobble 2s infinite ease-in-out; }
        .skin-snow      { filter:grayscale(1) brightness(3.5) saturate(0) drop-shadow(0 0 12px #fff);                                    animation:aFloat 3s infinite ease-in-out; }
        .skin-coal      { filter:grayscale(1) brightness(0.2);                                                                           animation:aShake 0.4s infinite; }
        .skin-carrot    { filter:hue-rotate(20deg) saturate(5) brightness(1.1);                                                          animation:aBob 2s infinite ease-in-out; }
        .skin-big       { filter:none;                                                                        transform:scale(1.35);     animation:aBigBob 2s infinite ease-in-out; }

        /* РЕДКИЕ */
        .skin-night     { filter:hue-rotate(210deg) saturate(3) brightness(0.5) drop-shadow(0 0 10px #1a237e);                           animation:aNight 2s infinite alternate; }
        .skin-amethyst  { filter:hue-rotate(260deg) saturate(4) brightness(1.2) drop-shadow(0 0 8px #9b59b6);                            animation:aSpin 5s infinite linear; }
        .skin-sea       { filter:hue-rotate(155deg) saturate(3) brightness(1.1) drop-shadow(0 0 8px #00bcd4);                            animation:aWave 2s infinite ease-in-out; }
        .skin-forest    { filter:hue-rotate(90deg) saturate(2.5) brightness(0.65);                                                       animation:aBob 2s infinite ease-in-out; }
        .skin-steel     { filter:hue-rotate(185deg) saturate(0.8) brightness(0.9) grayscale(0.4);                                        animation:aVibrate 0.1s infinite; }
        .skin-raspberry { filter:hue-rotate(300deg) saturate(4) brightness(1.1);                                                         animation:aHeartbeat 0.9s infinite; }
        .skin-wild      { filter:hue-rotate(45deg) saturate(3) brightness(0.8) contrast(1.3);                                            animation:aWild 1.5s infinite alternate; }
        .skin-cherry    { filter:hue-rotate(320deg) saturate(6) brightness(0.8) drop-shadow(0 0 8px #c0392b);                            animation:aHeartbeat 0.8s infinite; }

        /* ЭПИЧЕСКИЕ */
        .skin-bronze    { filter:hue-rotate(10deg) sepia(1) saturate(4) brightness(0.75) drop-shadow(0 0 8px #cd7f32);                   animation:aMetalGlow 2s infinite alternate; }
        .skin-silver    { filter:hue-rotate(185deg) saturate(0.3) brightness(2) contrast(1.4) drop-shadow(0 0 12px #8888ff);             animation:aFlip 4s infinite ease-in-out; }
        .skin-gold      { filter:sepia(1) saturate(15) brightness(1.3) contrast(1.3) drop-shadow(0 0 14px #ffcc00);                      animation:aGoldPulse 1.5s infinite alternate; }
        .skin-emerald   { filter:hue-rotate(110deg) saturate(5) brightness(1.1) drop-shadow(0 0 12px #2ecc71);                           animation:aEmerald 1.8s infinite alternate; }
        .skin-ruby      { filter:hue-rotate(330deg) saturate(5) brightness(0.85) drop-shadow(0 0 12px #e74c3c);                          animation:aHeartbeat 0.7s infinite; }
        .skin-toxic     { filter:hue-rotate(75deg) saturate(6) brightness(1.4) drop-shadow(0 0 14px #adff2f);                            animation:aToxic 1s infinite alternate; }
        .skin-sunrise   { filter:hue-rotate(340deg) saturate(4) brightness(1.3) drop-shadow(0 0 15px #ff6b35);                           animation:aSunrise 2s infinite alternate; }
        .skin-neon      { filter:hue-rotate(280deg) saturate(8) brightness(1.5) drop-shadow(0 0 15px #ff00ff);                           animation:aNeon 0.8s infinite alternate; }

        /* ЛЕГЕНДАРНЫЕ */
        .skin-rainbow   {                                                                                                                 animation:aRainbow 2.5s infinite linear; }
        .skin-fire      { filter:hue-rotate(5deg) saturate(5) brightness(1.1) drop-shadow(0 0 15px #e67e22);                             animation:aFire 1s infinite alternate; }
        .skin-cosmos    { filter:hue-rotate(240deg) saturate(3) brightness(0.4) drop-shadow(0 0 20px #9b59b6);                           animation:aCosmos 2s infinite alternate; }
        .skin-diamond   { filter:hue-rotate(175deg) saturate(2) brightness(2.2) drop-shadow(0 0 20px #85c1e9);                           animation:aDiamond 1.8s infinite alternate; }
        .skin-shadow    { filter:grayscale(1) brightness(0.05);                                                                          animation:aShadow 3s infinite alternate; }
        .skin-pen       { filter:hue-rotate(230deg) saturate(2) brightness(0.7) drop-shadow(0 0 10px #2980b9);                           animation:aPen 1s infinite ease-in-out; }
        .skin-sugar     { filter:brightness(1.6) saturate(0.3) drop-shadow(0 0 18px #fff) contrast(0.9);                                 animation:aSugar 2s infinite alternate; }
        .skin-galaxy    { filter:hue-rotate(200deg) saturate(5) brightness(0.6) drop-shadow(0 0 25px #8e44ad);                           animation:aGalaxy 3s infinite linear; }

        /* ====== АНИМАЦИИ ====== */
        @keyframes aBob       { 0%,100%{transform:translateY(0)}           50%{transform:translateY(-15px)} }
        @keyframes aBigBob    { 0%,100%{transform:scale(1.35) translateY(0)} 50%{transform:scale(1.35) translateY(-12px)} }
        @keyframes aWobble    { 0%,100%{transform:rotate(0)}               25%{transform:rotate(-10deg)} 75%{transform:rotate(10deg)} }
        @keyframes aFloat     { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-18px) rotate(15deg)} }
        @keyframes aShake     { 0%,100%{transform:translateX(0)}           25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
        @keyframes aHeartbeat { 0%,100%{transform:scale(1)} 15%{transform:scale(1.2)} 30%{transform:scale(1)} 45%{transform:scale(1.1)} }
        @keyframes aSpin      { 0%{transform:rotate(0)}                    100%{transform:rotate(360deg)} }
        @keyframes aWave      { 0%,100%{transform:rotate(-10deg)}          50%{transform:rotate(10deg)} }
        @keyframes aVibrate   { 0%,100%{transform:translate(0,0)}          50%{transform:translate(3px,2px)} }
        @keyframes aWild      { 0%{transform:scale(1) rotate(-5deg) translateY(0)} 100%{transform:scale(1.1) rotate(5deg) translateY(-10px)} }
        @keyframes aNight     { 0%{filter:hue-rotate(210deg) saturate(3) brightness(0.4) drop-shadow(0 0 5px #1a237e)} 100%{filter:hue-rotate(220deg) saturate(3) brightness(0.7) drop-shadow(0 0 20px #3949ab)} }
        @keyframes aMetalGlow { 0%{filter:hue-rotate(10deg) sepia(1) saturate(4) brightness(0.75) drop-shadow(0 0 4px #cd7f32)} 100%{filter:hue-rotate(10deg) sepia(1) saturate(4) brightness(1.0) drop-shadow(0 0 18px #cd7f32)} }
        @keyframes aFlip      { 0%,100%{transform:rotateY(0) scale(1)}     50%{transform:rotateY(180deg) scale(1.1)} }
        @keyframes aGoldPulse { 0%{filter:sepia(1) saturate(15) brightness(1.1) drop-shadow(0 0 6px #ffcc00);transform:scale(1)} 100%{filter:sepia(1) saturate(20) brightness(1.5) drop-shadow(0 0 22px #ffcc00);transform:scale(1.08)} }
        @keyframes aEmerald   { 0%{filter:hue-rotate(110deg) saturate(5) brightness(0.9) drop-shadow(0 0 4px #2ecc71)} 100%{filter:hue-rotate(110deg) saturate(6) brightness(1.3) drop-shadow(0 0 22px #2ecc71)} }
        @keyframes aToxic     { 0%{filter:hue-rotate(75deg) saturate(6) brightness(1.2) drop-shadow(0 0 6px #adff2f);transform:scale(1)} 100%{filter:hue-rotate(85deg) saturate(8) brightness(1.6) drop-shadow(0 0 22px #adff2f);transform:scale(1.08)} }
        @keyframes aSunrise   { 0%{filter:hue-rotate(340deg) saturate(3) brightness(1.1) drop-shadow(0 0 8px #ff6b35)} 100%{filter:hue-rotate(20deg) saturate(5) brightness(1.5) drop-shadow(0 0 25px #ffd700)} }
        @keyframes aNeon      { 0%{filter:hue-rotate(280deg) saturate(8) brightness(1.3) drop-shadow(0 0 10px #ff00ff)} 100%{filter:hue-rotate(300deg) saturate(10) brightness(1.8) drop-shadow(0 0 30px #ff00ff)} }
        @keyframes aRainbow   { 0%{filter:hue-rotate(0deg) saturate(3) brightness(1.1)} 100%{filter:hue-rotate(360deg) saturate(3) brightness(1.1)} }
        @keyframes aFire      { 0%{filter:hue-rotate(5deg) saturate(5) brightness(1.0) drop-shadow(0 0 8px #e67e22);transform:scale(1) rotate(-2deg)} 100%{filter:hue-rotate(15deg) saturate(6) brightness(1.3) drop-shadow(0 0 22px #ff4500);transform:scale(1.1) rotate(2deg)} }
        @keyframes aCosmos    { 0%{filter:hue-rotate(240deg) saturate(3) brightness(0.35) drop-shadow(0 0 10px #6c3483)} 100%{filter:hue-rotate(260deg) saturate(4) brightness(0.55) drop-shadow(0 0 28px #a569bd)} }
        @keyframes aDiamond   { 0%{filter:hue-rotate(175deg) saturate(2) brightness(1.8) drop-shadow(0 0 10px #85c1e9)} 100%{filter:hue-rotate(190deg) saturate(3) brightness(2.6) drop-shadow(0 0 28px #aed6f1)} }
        @keyframes aShadow    { 0%{filter:grayscale(1) brightness(0.05)} 100%{filter:grayscale(1) brightness(0.15) drop-shadow(0 0 22px #333)} }
        @keyframes aPen       { 0%,100%{transform:rotate(-15deg) translateY(0)} 50%{transform:rotate(15deg) translateY(-10px)} }
        @keyframes aSugar     { 0%{filter:brightness(1.4) saturate(0.3) drop-shadow(0 0 10px #fff) contrast(0.9)} 100%{filter:brightness(2.0) saturate(0.1) drop-shadow(0 0 30px #fff) contrast(0.8)} }
        @keyframes aGalaxy    { 0%{filter:hue-rotate(200deg) saturate(5) brightness(0.6) drop-shadow(0 0 15px #8e44ad)} 50%{filter:hue-rotate(260deg) saturate(6) brightness(0.8) drop-shadow(0 0 30px #3498db)} 100%{filter:hue-rotate(200deg) saturate(5) brightness(0.6) drop-shadow(0 0 15px #8e44ad)} }

        .float { position:fixed; color:var(--yellow); font-weight:bold; font-size:28px; pointer-events:none; animation:floatUp 0.8s forwards; z-index:999; }
        @keyframes floatUp { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-120px);opacity:0} }
    </style>
</head>
