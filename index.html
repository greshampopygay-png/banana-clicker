<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Banana Clicker Business Edition</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle, #ffe100 0%, #e6b800 100%);
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* Рекламный блок сверху */
        .ad-top {
            position: absolute;
            top: 10px;
            width: 320px;
            height: 50px;
            background: rgba(0,0,0,0.1);
            border: 1px dashed #666;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            color: #444;
        }

        #score-container { font-size: 4rem; color: #333; text-shadow: 2px 2px 0px #fff; margin-bottom: 5px; }
        #bps-display { font-size: 1.2rem; color: #555; margin-bottom: 20px; }
        
        #banana {
            width: 200px;
            cursor: pointer;
            transition: transform 0.05s ease;
            -webkit-user-drag: none;
        }
        #banana:active { transform: scale(0.85); }

        .shop {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            text-align: center;
        }

        .shop-item {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .shop-item:disabled { background-color: #888; opacity: 0.7; }

        /* Кнопка доната */
        .donate-btn {
            margin-top: 15px;
            padding: 8px 15px;
            background-color: #ff4500;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-block;
        }

        .bonus-anim {
            position: absolute;
            color: #ff4500;
            font-size: 2rem;
            animation: floatUp 1s forwards;
            pointer-events: none;
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="ad-top">МЕСТО ДЛЯ РЕКЛАМЫ (Google AdSense)</div>

    <div id="score-container">0</div>
    <div id="bps-display">Бананов в сек: 0</div>
    
    <img id="banana" src="https://img.icons8.com/emoji/256/banana-emoji.png" alt="Banana">

    <div class="shop">
        <button id="buyAuto" class="shop-item" disabled>Купить Автокликер (10 🍌)</button>
        <br>
        <a href="https://www.donationalerts.com/" target="_blank" class="donate-btn">Поддержать автора ☕</a>
    </div>

    <script>
        let count = 0;
        let autoClickers = 0;
        let autoClickPrice = 10;

        const scoreDisplay = document.getElementById('score-container');
        const bpsDisplay = document.getElementById('bps-display');
        const banana = document.getElementById('banana');
        const buyBtn = document.getElementById('buyAuto');

        banana.addEventListener('click', (e) => {
            count++;
            if (count === 10) { count += 10; createFloatingText(e, "+10!"); }
            updateUI();
        });

        buyBtn.addEventListener('click', () => {
            if (count >= autoClickPrice) {
                count -= autoClickPrice;
                autoClickers++;
                autoClickPrice = Math.round(autoClickPrice * 1.5);
                buyBtn.innerText = `Купить Автокликер (${autoClickPrice} 🍌)`;
                updateUI();
            }
        });

        setInterval(() => {
            if (autoClickers > 0) {
                count += autoClickers;
                updateUI();
            }
        }, 1000);

        function updateUI() {
            scoreDisplay.innerText = Math.floor(count);
            bpsDisplay.innerText = `Бананов в сек: ${autoClickers}`;
            buyBtn.disabled = count < autoClickPrice;
        }

        function createFloatingText(e, text) {
            const bonus = document.createElement('div');
            bonus.className = 'bonus-anim';
            bonus.innerText = text;
            bonus.style.left = e.pageX + 'px';
            bonus.style.top = e.pageY + 'px';
            document.body.appendChild(bonus);
            setTimeout(() => bonus.remove(), 1000);
        }
    </script>
</body>
</html>
