<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Banana Clicker Store</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle, #ffe100 0%, #e6b800 100%);
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #score-container {
            font-size: 4rem;
            color: #333;
            text-shadow: 2px 2px 0px #fff;
            margin-bottom: 5px;
        }

        #bps-display {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 20px;
        }

        #banana {
            width: 250px;
            cursor: pointer;
            transition: transform 0.05s ease;
            -webkit-user-drag: none;
        }

        #banana:active { transform: scale(0.85); }

        /* Магазин */
        .shop {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .shop-item {
            padding: 15px 25px;
            font-size: 1rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .shop-item:disabled {
            background-color: #888;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .shop-item:hover:not(:disabled) {
            background-color: #45a049;
            transform: translateY(-2px);
        }

        /* Анимация бонуса */
        .bonus-anim {
            position: absolute;
            color: #ff4500;
            font-size: 2rem;
            animation: floatUp 1s forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>

    <div id="score-container">0</div>
    <div id="bps-display">Бананов в сек: 0</div>
    
    <img id="banana" src="https://img.icons8.com/emoji/256/banana-emoji.png" alt="Banana">

    <div class="shop">
        <button id="buyAuto" class="shop-item" disabled>
            Купить Автокликер (10 🍌)
        </button>
    </div>

    <script>
        let count = 0;
        let autoClickers = 0;
        let autoClickPrice = 10;

        const scoreDisplay = document.getElementById('score-container');
        const bpsDisplay = document.getElementById('bps-display');
        const banana = document.getElementById('banana');
        const buyBtn = document.getElementById('buyAuto');

        // Клик по банану
        banana.addEventListener('click', (e) => {
            count++;
            checkBonuses(e);
            updateUI();
        });

        // Покупка автокликера
        buyBtn.addEventListener('click', () => {
            if (count >= autoClickPrice) {
                count -= autoClickPrice;
                autoClickers++;
                // Цена растет с каждой покупкой (опционально)
                autoClickPrice = Math.round(autoClickPrice * 1.5);
                buyBtn.innerText = `Купить Автокликер (${autoClickPrice} 🍌)`;
                updateUI();
            }
        });

        // Проверка бонусов за 10 и 50 (как ты просил)
        function checkBonuses(e) {
            if (count === 10) {
                count += 10;
                createFloatingText(e, "+10 БОНУС!");
            } else if (count === 50) {
                count += 50;
                createFloatingText(e, "+50 МЕГА!");
            }
        }

        // Логика автокликера (срабатывает каждую секунду)
        setInterval(() => {
            if (autoClickers > 0) {
                count += autoClickers;
                updateUI();
            }
        }, 1000);

        function updateUI() {
            scoreDisplay.innerText = Math.floor(count);
            bpsDisplay.innerText = `Бананов в сек: ${autoClickers}`;
            
            // Активируем кнопку, если хватает денег
            buyBtn.disabled = count < autoClickPrice;
        }

        function createFloatingText(e, text) {
            const bonus = document.createElement('div');
            bonus.className = 'bonus-anim';
            bonus.innerText = text;
            bonus.style.left = e.pageX + 'px';
            bonus.style.top = e.pageY + 'px';
            document.body.appendChild(bonus);
            setTimeout(() => bonus.remove(), 1000);
        }
    </script>
</body>
</html>
