<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banana Empire: xeoni7 Official</title>
    <script src="https://omg10.com/4/10948390"></script>
    <style>
        :root { --yellow: #f1c40f; --purple: #9b59b6; --green: #2ecc71; --dark: #0f0f0f; --card: rgba(255,255,255,0.06); }
        body { text-align:center; font-family:'Segoe UI',sans-serif; background:var(--dark); color:white; margin:0; padding:15px; user-select:none; touch-action:manipulation; overflow-x:hidden; }
        .stats-box { background:var(--card); padding:20px; border-radius:25px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.1); }
        .score-val { font-size:52px; color:var(--yellow); font-weight:900; display:block; }
        .sub-stats { font-size:13px; color:#888; margin-top:5px; }
        .vip-badge { color:var(--purple); font-weight:bold; font-size:14px; display:none; margin-bottom:5px; }
        #game-area { height:220px; display:flex; align-items:center; justify-content:center; position:relative; }
        #banana { width:170px; cursor:pointer; transition:transform 0.1s; z-index:5; object-fit: contain; }
        #banana:active { transform:scale(0.85) !important; }
        .btn { width:100%; max-width:340px; padding:18px; border:none; border-radius:20px; font-weight:800; cursor:pointer; margin-bottom:12px; font-size:15px; transition:0.3s; }
        .btn-don { background:linear-gradient(45deg,#8e44ad,#9b59b6); color:white; box-shadow:0 4px 15px rgba(155,89,182,0.4); }
        .btn-ads { background:#ff4757; color:white; }
        .title { text-align:left; padding:10px 0 10px 10px; font-size:14px; color:#555; text-transform:uppercase; letter-spacing:1px; }
        .upg-card { background:var(--card); margin-bottom:10px; padding:15px; border-radius:20px; display:flex; justify-content:space-between; align-items:center; }
        .upg-name { text-align:left; }
        .upg-name b { display:block; font-size:17px; }
        .upg-name i { font-size:12px; color:var(--green); font-style:normal; font-weight:bold; }
        .buy-btn { background:#252525; color:white; border:1px solid #444; padding:12px 20px; border-radius:15px; font-weight:bold; cursor:pointer; }
        .skin-tabs { display:flex; gap:8px; margin-bottom:12px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
        .skin-tabs::-webkit-scrollbar { display:none; }
        .skin-tab { padding:8px 16px; border-radius:30px; border:none; font-weight:700; font-size:12px; cursor:pointer; white-space:nowrap; background:#1a1a1a; color:#888; }
        .skin-tab.active { color:#0f0f0f; }
        .skin-tab[data-cat="all"].active { background:#f1c40f; }
        .skin-tab[data-cat="common"].active { background:#aaa; }
        .skin-tab[data-cat="rare"].active { background:#4fc3f7; }
        .skin-tab[data-cat="epic"].active { background:#ab47bc; }
        .skin-tab[data-cat="legendary"].active { background:linear-gradient(90deg,#f1c40f,#e67e22,#e74c3c); color:white; }
        .skin-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:5px; padding-bottom:40px; }
        .skin-item { background:var(--card); padding:12px; border-radius:20px; border:2px solid transparent; cursor:pointer; transition:0.2s; }
        .skin-item.active { border-color:var(--yellow); background:rgba(241,196,15,0.1); }
        .skin-img { width:50px; height:50px; margin-bottom:5px; object-fit: contain; }
        .skin-price { font-size:10px; color:#aaa; font-weight:bold; }
        .skin-label { font-size:12px; color:#ddd; font-weight:600; margin-bottom:3px; }
        .skin-rarity { font-size:9px; margin-bottom:4px; }
        .skin-rarity.common { color:#aaa; }
        .skin-rarity.rare { color:#4fc3f7; }
        .skin-rarity.epic { color:#ab47bc; }
        .skin-rarity.legendary { background:linear-gradient(90deg,#f1c40f,#e67e22); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:800; }

        /* Эффекты для уникальных скинов */
        .skin-big       { transform: scale(1.45); filter: none; }
        .anim-rainbow   { animation: aRainbow 2.5s infinite linear; }
        
        /* Свечения для твоих фото-скинов */
        .anim-fire      { animation: aFire 1s infinite alternate; }
        .anim-cosmos    { animation: aCosmos 2s infinite alternate; }
        .anim-diamond   { animation: aDiamond 1.8s infinite alternate; }
        .anim-cherry    { animation: aCherry 1.5s infinite alternate; }
        .anim-pen       { animation: aPen 2s infinite linear; }
        .anim-sunrise   { animation: aSunrise 3s infinite linear; }

        @keyframes aRainbow { 0%{filter:hue-rotate(0deg) saturate(3)} 100%{filter:hue-rotate(360deg) saturate(3)} }
        @keyframes aFire    { 0%{filter: drop-shadow(0 0 5px #e67e22)} 100%{filter: drop-shadow(0 0 18px #ff4500)} }
        @keyframes aCosmos  { 0%{filter: drop-shadow(0 0 5px #6c3483)} 100%{filter: drop-shadow(0 0 20px #a569bd)} }
        @keyframes aDiamond { 0%{filter: drop-shadow(0 0 5px #85c1e9)} 100%{filter: drop-shadow(0 0 20px #aed6f1)} }
        @keyframes aCherry  { 0%{filter: drop-shadow(0 0 4px #922b21)} 100%{filter: drop-shadow(0 0 15px #e74c3c)} }
        @keyframes aPen     { 0%{transform:rotate(0deg)} 25%{transform:rotate(-8deg)} 75%{transform:rotate(8deg)} 100%{transform:rotate(0deg)} }
        @keyframes aSunrise { 0%{filter: drop-shadow(0 0 5px #e67e22)} 50%{filter: drop-shadow(0 0 15px #f39c12)} 100%{filter: drop-shadow(0 0 5px #e67e22)} }

        .float { position:fixed; color:var(--yellow); font-weight:bold; font-size:28px; pointer-events:none; animation:floatUp 0.8s forwards; z-index:999; }
        @keyframes floatUp { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-120px);opacity:0} }
    </style>
</head>
<body>

<div class="stats-box">
    <div class="vip-badge" id="v-bad">★ VIP xeoni7 x2 ★</div>
    <span class="score-val" id="sc-val">0</span>
    <div class="sub-stats">За клик: +<span id="c-pw">1</span> | В секунду: +<span id="a-pw">0</span></div>
</div>

<div id="game-area">
    <img id="banana" src="https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/banana-emoji.png" onclick="handleBananaClick(event)" onerror="this.src='https://img.icons8.com/emoji/256/banana-emoji.png'">
</div>

<button class="btn btn-don" onclick="openDonate()">💜 ПОДДЕРЖАТЬ xeoni7 (VIP X2)</button>
<button class="btn btn-ads" onclick="watchAdBonus()">📺 БОНУС +100 БАНАНОВ</button>

<div class="title">Улучшения</div>
<div class="upg-card">
    <div class="upg-name"><b>💪 Качалка пальцев</b><i id="c-cost">Цена: 15</i></div>
    <button class="buy-btn" onclick="buyUpgrade('click')">КУПИТЬ</button>
</div>
<div class="upg-card">
    <div class="upg-name"><b>🤖 Банано-бот</b><i id="a-cost">Цена: 50</i></div>
    <button class="buy-btn" onclick="buyUpgrade('auto')">КУПИТЬ</button>
</div>

<div class="title">Скины</div>
<div class="skin-tabs">
    <button class="skin-tab active" data-cat="all" onclick="filterSkins('all',this)">🍌 Все</button>
    <button class="skin-tab" data-cat="common" onclick="filterSkins('common',this)">⚪ Обычные</button>
    <button class="skin-tab" data-cat="rare" onclick="filterSkins('rare',this)">🔵 Редкие</button>
    <button class="skin-tab" data-cat="epic" onclick="filterSkins('epic',this)">🟣 Эпические</button>
    <button class="skin-tab" data-cat="legendary" onclick="filterSkins('legendary',this)">🌟 Легенды</button>
</div>
<div class="skin-grid" id="skin-shop"></div>

<script>
    const DONATE_URL = "https://www.donationalerts.com/r/xeoni7";
    const DEFAULT_IMG = "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/banana-emoji.png";

    let game = {
        score:      parseFloat(localStorage.getItem('x_sc'))  || 0,
        clickPower: parseInt(localStorage.getItem('x_cp'))    || 1,
        autoPower:  parseInt(localStorage.getItem('x_ap'))    || 0,
        clickCost:  parseInt(localStorage.getItem('x_cc'))    || 15,
        autoCost:   parseInt(localStorage.getItem('x_ac'))    || 50,
        isVip:      localStorage.getItem('x_vip') === 'true',
        ownedSkins: JSON.parse(localStorage.getItem('x_own')) || [0],
        activeSkin: parseInt(localStorage.getItem('x_act'))   || 0
    };

    // МАССИВ С ТВОИМИ ГОТОВЫМИ ССЫЛКАМИ
    const skinList = [
        // --- ОБЫЧНЫЕ ---
        { n:"Классик",        p:0,      img: DEFAULT_IMG, cls:"",              cat:"common",    emoji:"🍌" },
        { n:"Зелень",         p:200,    img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/zelen.png", cls:"",              cat:"common",    emoji:"🟢" },
        { n:"Переспел",       p:500,    img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/perespel.png", cls:"",              cat:"common",    emoji:"🟤" },
        { n:"Снег",           p:1000,   img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/sneg.png", cls:"",              cat:"common",    emoji:"⚪" },
        { n:"Уголь",          p:1500,   img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/ugol.png", cls:"",              cat:"common",    emoji:"⚫" },
        { n:"Морковный",      p:800,    img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/morkovniy.png", cls:"",              cat:"common",    emoji:"🥕" },
        { n:"Большой",        p:1200,   img: DEFAULT_IMG, cls:"skin-big",      cat:"common",    emoji:"🔆" },
        // --- РЕДКИЕ ---
        { n:"Ночь",           p:3000,   img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/noch.png", cls:"",              cat:"rare",      emoji:"🌙" },
        { n:"Аметист",        p:5000,   img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/ametist.png", cls:"",              cat:"rare",      emoji:"💜" },
        { n:"Морской",        p:7000,   img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/morskoy.png", cls:"",              cat:"rare",      emoji:"🌊" },
        { n:"Лесной",         p:10000,  img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/lesnoy.png", cls:"",              cat:"rare",      emoji:"🌲" },
        { n:"Стальной",       p:12000,  img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/stalnoy.png", cls:"",              cat:"rare",      emoji:"🔩" },
        { n:"Малина",         p:15000,  img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/malina.png", cls:"",              cat:"rare",      emoji:"🍓" },
        { n:"Лазуритовый",    p:4000,   img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/lazurit.png", cls:"",              cat:"rare",      emoji:"🔷" },
        { n:"Неспелый",       p:6000,   img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/nespelyi.png", cls:"",              cat:"rare",      emoji:"🌿" },
        // --- ЭПИЧЕСКИЕ ---
        { n:"Бронза",         p:25000,  img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/bronza.png", cls:"",              cat:"epic",      emoji:"🥉" },
        { n:"Серебро",        p:40000,  img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/serebro.png", cls:"",              cat:"epic",      emoji:"🥈" },
        { n:"Золото",         p:60000,  img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/zoloto.png", cls:"",              cat:"epic",      emoji:"🥇" },
        { n:"Изумруд",        p:80000,  img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/izumrud.png", cls:"",              cat:"epic",      emoji:"💚" },
        { n:"Рубин",          p:100000, img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/rubin.png", cls:"",              cat:"epic",      emoji:"❤️" },
        { n:"Ядовитый",       p:120000, img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/toxic.png", cls:"",              cat:"epic",      emoji:"☣️" },
        { n:"Пиксельный",     p:35000,  img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/pixel.png", cls:"",              cat:"epic",      emoji:"👾" },
        { n:"В глазури",      p:50000,  img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/glazur.png", cls:"",              cat:"epic",      emoji:"🤍" },
        // --- ЛЕГЕНДАРНЫЕ ---
        { n:"Радуга",         p:200000, img: DEFAULT_IMG, cls:"anim-rainbow",  cat:"legendary", emoji:"🌈" },
        { n:"Огненный",       p:300000, img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/fire.png", cls:"anim-fire",     cat:"legendary", emoji:"🔥" },
        { n:"Космос",         p:400000, img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/cosmos.png", cls:"anim-cosmos",   cat:"legendary", emoji:"🌌" },
        { n:"Алмаз",          p:500000, img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/diamond.png", cls:"anim-diamond",  cat:"legendary", emoji:"💎" },
        { n:"Тень",           p:666000, img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/shadow.png", cls:"",              cat:"legendary", emoji:"🖤" },
        { n:"Вишнёвый",       p:250000, img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/cherry.png", cls:"anim-cherry",   cat:"legendary", emoji:"🍒" },
        { n:"Банан-ручка",    p:350000, img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/pen.png", cls:"anim-pen",      cat:"legendary", emoji:"🖊️" },
        { n:"Восход",         p:450000, img: "https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/sunrise.png", cls:"anim-sunrise",  cat:"legendary", emoji:"🌅" },
    ];

    const rarityLabels = { common:"Обычный", rare:"Редкий", epic:"Эпический", legendary:"Легендарный" };
    let currentFilter = 'all';

    function filterSkins(cat, btn) {
        currentFilter = cat;
        document.querySelectorAll('.skin-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        renderSkins();
    }

    function saveGame() {
        localStorage.setItem('x_sc',  game.score);
        localStorage.setItem('x_cp',  game.clickPower);
        localStorage.setItem('x_ap',  game.autoPower);
        localStorage.setItem('x_cc',  game.clickCost);
        localStorage.setItem('x_ac',  game.autoCost);
        localStorage.setItem('x_vip', game.isVip);
        localStorage.setItem('x_own', JSON.stringify(game.ownedSkins));
        localStorage.setItem('x_act', game.activeSkin);
    }

    function handleBananaClick(e) {
        let p = game.isVip ? game.clickPower * 2 : game.clickPower;
        game.score += p;
        let f = document.createElement('div');
        f.className = 'float'; f.innerText = '+' + p;
        f.style.left = e.clientX + 'px'; f.style.top = e.clientY + 'px';
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 800);
        updateUI();
    }

    function buyUpgrade(type) {
        if (type === 'click' && game.score >= game.clickCost) {
            game.score -= game.clickCost; game.clickPower++;
            game.clickCost = Math.round(game.clickCost * 1.6);
        } else if (type === 'auto' && game.score >= game.autoCost) {
            game.score -= game.autoCost; game.autoPower++;
            game.autoCost = Math.round(game.autoCost * 1.7);
        }
        updateUI();
    }

    function selectSkin(id) {
        if (game.ownedSkins.includes(id)) {
            game.activeSkin = id;
        } else if (game.score >= skinList[id].p) {
            game.score -= skinList[id].p;
            game.ownedSkins.push(id);
            game.activeSkin = id;
        }
        updateUI();
    }

    function openDonate() {
        window.open(DONATE_URL, "_blank");
        game.isVip = true;
        updateUI();
        alert("xeoni7 благодарит тебя! VIP x2 активирован!");
    }

    function watchAdBonus() {
        window.open("https://omg10.com/4/10948390", "_blank");
        game.score += 100;
        updateUI();
    }

    function renderSkins() {
        let html = '';
        skinList.forEach((s, i) => {
            if (currentFilter !== 'all' && s.cat !== currentFilter) return;
            let owned    = game.ownedSkins.includes(i);
            let isActive = game.activeSkin === i;
            let price    = owned ? '✓ ВЫБРАТЬ' : '🍌 ' + s.p.toLocaleString('ru');
            html += `<div class="skin-item ${isActive ? 'active' : ''}" onclick="selectSkin(${i})">
                <img src="${s.img}" class="skin-img ${s.cls}">
                <div class="skin-label">${s.emoji} ${s.n}</div>
                <div class="skin-rarity ${s.cat}">${rarityLabels[s.cat]}</div>
                <div class="skin-price">${price}</div>
            </div>`;
        });
        document.getElementById('skin-shop').innerHTML = html;
    }

    function updateUI() {
        let activeSkinData = skinList[game.activeSkin];
        document.getElementById('sc-val').innerText  = Math.floor(game.score).toLocaleString('ru');
        document.getElementById('c-pw').innerText    = game.isVip ? game.clickPower * 2 : game.clickPower;
        document.getElementById('a-pw').innerText    = game.autoPower;
        document.getElementById('c-cost').innerText  = "Цена: " + game.clickCost.toLocaleString('ru');
        document.getElementById('a-cost').innerText  = "Цена: " + game.autoCost.toLocaleString('ru');
        document.getElementById('v-bad').style.display = game.isVip ? 'block' : 'none';
        
        let mainBanana = document.getElementById('banana');
        mainBanana.src = activeSkinData.img;
        mainBanana.className = activeSkinData.cls;

        renderSkins();
        saveGame();
    }

    setInterval(() => { if (game.autoPower > 0) { game.score += game.autoPower; updateUI(); } }, 1000);
    setInterval(saveGame, 5000);
    updateUI();
</script>
</body>
    </html>
