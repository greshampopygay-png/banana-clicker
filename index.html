<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banana Empire: xeoni7 Official</title>
    <script src="https://omg10.com/4/10948390"></script>
    <style>
        :root {
            --yellow: #f1c40f; --purple: #9b59b6; --blue: #3498db; --green: #2ecc71;
            --dark: #0f0f0f; --card: rgba(255,255,255,0.06);
        }
        body { 
            text-align: center; font-family: 'Segoe UI', sans-serif; 
            background: var(--dark); color: white; margin: 0; padding: 15px;
            user-select: none; touch-action: manipulation; overflow-x: hidden;
        }
        .stats-box { 
            background: var(--card); padding: 20px; border-radius: 25px; 
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        .score-val { font-size: 52px; color: var(--yellow); font-weight: 900; display: block; }
        .sub-stats { font-size: 13px; color: #888; margin-top: 5px; }
        .vip-badge { color: var(--purple); font-weight: bold; font-size: 14px; display: none; margin-bottom: 5px; }

        #game-area { height: 220px; display: flex; align-items: center; justify-content: center; position: relative; }
        #banana { 
            width: 170px; height: 170px; cursor: pointer; transition: transform 0.1s;
            z-index: 5;
        }
        #banana:active { transform: scale(0.85); }

        .btn {
            width: 100%; max-width: 340px; padding: 18px; border: none; border-radius: 20px;
            font-weight: 800; cursor: pointer; margin-bottom: 12px; font-size: 15px; transition: 0.3s;
        }
        .btn-don { background: linear-gradient(45deg, #8e44ad, #9b59b6); color: white; box-shadow: 0 4px 15px rgba(155, 89, 182, 0.4); }
        .btn-ads { background: #ff4757; color: white; }

        .title { text-align: left; padding: 10px 0 10px 10px; font-size: 14px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .upg-card { 
            background: var(--card); margin-bottom: 10px; padding: 15px; border-radius: 20px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .upg-name { text-align: left; }
        .upg-name b { display: block; font-size: 17px; }
        .upg-name i { font-size: 12px; color: var(--green); font-style: normal; font-weight: bold; }
        .buy-btn { background: #252525; color: white; border: 1px solid #444; padding: 12px 20px; border-radius: 15px; font-weight: bold; cursor: pointer; }

        .skin-tabs {
            display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto;
            padding-bottom: 4px; scrollbar-width: none;
        }
        .skin-tabs::-webkit-scrollbar { display: none; }
        .skin-tab {
            padding: 8px 16px; border-radius: 30px; border: none; font-weight: 700;
            font-size: 12px; cursor: pointer; white-space: nowrap; transition: 0.2s;
            background: #1a1a1a; color: #888;
        }
        .skin-tab.active { color: #0f0f0f; }
        .skin-tab[data-cat="common"].active { background: #aaa; }
        .skin-tab[data-cat="rare"].active { background: #4fc3f7; }
        .skin-tab[data-cat="epic"].active { background: #ab47bc; }
        .skin-tab[data-cat="legendary"].active { background: linear-gradient(90deg,#f1c40f,#e67e22,#e74c3c); color: white; }

        .skin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 5px; padding-bottom: 40px; }
        .skin-item { 
            background: var(--card); padding: 12px; border-radius: 20px; 
            border: 2px solid transparent; cursor: pointer; transition: 0.2s;
        }
        .skin-item.active { border-color: var(--yellow); background: rgba(241,196,15,0.1); }
        .skin-img { width: 50px; height: 50px; margin-bottom: 5px; }
        .skin-price { font-size: 10px; color: #aaa; font-weight: bold; }
        .skin-label { font-size: 12px; color: #ddd; font-weight: 600; margin-bottom: 3px; }
        .skin-rarity { font-size: 9px; margin-bottom: 4px; }
        .skin-rarity.common { color: #aaa; }
        .skin-rarity.rare { color: #4fc3f7; }
        .skin-rarity.epic { color: #ab47bc; }
        .skin-rarity.legendary { background: linear-gradient(90deg,#f1c40f,#e67e22); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }

        .skin-classic   { filter: none; }
        .skin-green     { filter: hue-rotate(60deg) saturate(1.5) brightness(1.1); }
        .skin-overripe  { filter: hue-rotate(25deg) saturate(0.5) brightness(0.45); }
        .skin-snow      { filter: grayscale(1) brightness(3.5) saturate(0) drop-shadow(0 0 12px #ffffff); }
        .skin-coal      { filter: grayscale(1) brightness(0.25); }
        .skin-night     { filter: hue-rotate(200deg) saturate(2.5) brightness(0.5); }
        .skin-amethyst  { filter: hue-rotate(260deg) saturate(4) brightness(1.2); }
        .skin-sea       { filter: hue-rotate(155deg) saturate(3) brightness(1.1); }
        .skin-forest    { filter: hue-rotate(90deg) saturate(2.5) brightness(0.65); }
        .skin-steel     { filter: hue-rotate(185deg) saturate(1.2) brightness(0.85) grayscale(0.4); }
        .skin-raspberry { filter: hue-rotate(300deg) saturate(4) brightness(1.1); }
        .skin-bronze    { filter: hue-rotate(10deg) sepia(1) saturate(4) brightness(0.75) drop-shadow(0 0 6px #cd7f32); }
        .skin-silver    { filter: hue-rotate(185deg) saturate(0.4) brightness(1.8) contrast(1.4) drop-shadow(0 0 10px #aaaaff); }
        .skin-gold      { filter: sepia(1) saturate(15) brightness(1.3) contrast(1.3) drop-shadow(0 0 12px #ffcc00); }
        .skin-emerald   { filter: hue-rotate(110deg) saturate(5) brightness(1.1) drop-shadow(0 0 8px #2ecc71); }
        .skin-ruby      { filter: hue-rotate(330deg) saturate(5) brightness(0.85) drop-shadow(0 0 8px #c0392b); }
        .skin-toxic     { filter: hue-rotate(75deg) saturate(6) brightness(1.4) drop-shadow(0 0 10px #adff2f); }
        /* ОБЫЧНЫЕ */
        .skin-classic   { animation: gentleBob 2s infinite ease-in-out; }
        .skin-green     { filter: hue-rotate(60deg) saturate(1.5) brightness(1.1); animation: gentleBob 2.5s infinite ease-in-out; }
        .skin-overripe  { filter: hue-rotate(25deg) saturate(0.5) brightness(0.45); animation: wobble 3s infinite ease-in-out; }
        .skin-snow      { filter: grayscale(1) brightness(3.5) saturate(0) drop-shadow(0 0 12px #ffffff); animation: snowFloat 3s infinite ease-in-out; }
        .skin-coal      { filter: grayscale(1) brightness(0.25); animation: shake 0.4s infinite; }

        /* РЕДКИЕ */
        .skin-night     { filter: hue-rotate(200deg) saturate(2.5) brightness(0.5); animation: nightPulse 2s infinite alternate; }
        .skin-amethyst  { filter: hue-rotate(260deg) saturate(4) brightness(1.2); animation: crystalSpin 5s infinite linear; }
        .skin-sea       { filter: hue-rotate(155deg) saturate(3) brightness(1.1); animation: wave 2s infinite ease-in-out; }
        .skin-forest    { filter: hue-rotate(90deg) saturate(2.5) brightness(0.65); animation: gentleBob 2s infinite ease-in-out; }
        .skin-steel     { filter: hue-rotate(185deg) saturate(1.2) brightness(0.85) grayscale(0.4); animation: steelVibrate 0.1s infinite; }
        .skin-raspberry { filter: hue-rotate(300deg) saturate(4) brightness(1.1); animation: heartbeat 0.9s infinite; }

        /* ЭПИЧЕСКИЕ */
        .skin-bronze    { filter: hue-rotate(10deg) sepia(1) saturate(4) brightness(0.75) drop-shadow(0 0 6px #cd7f32); animation: metalGlow 2s infinite alternate; }
        .skin-silver    { filter: hue-rotate(185deg) saturate(0.4) brightness(1.8) contrast(1.4) drop-shadow(0 0 10px #aaaaff); animation: silverSpin 6s infinite linear; }
        .skin-gold      { filter: sepia(1) saturate(15) brightness(1.3) contrast(1.3) drop-shadow(0 0 12px #ffcc00); animation: goldPulse 1.5s infinite alternate; }
        .skin-emerald   { filter: hue-rotate(110deg) saturate(5) brightness(1.1) drop-shadow(0 0 8px #2ecc71); animation: emeraldGlow 1.8s infinite alternate; }
        .skin-ruby      { filter: hue-rotate(330deg) saturate(5) brightness(0.85) drop-shadow(0 0 8px #c0392b); animation: heartbeat 0.7s infinite; }
        .skin-toxic     { filter: hue-rotate(75deg) saturate(6) brightness(1.4) drop-shadow(0 0 10px #adff2f); animation: toxicBubble 1s infinite alternate; }

        /* ЛЕГЕНДАРНЫЕ */
        .skin-rainbow   { animation: rainbowAnim 2.5s infinite linear; }
        .skin-fire      { filter: hue-rotate(5deg) saturate(5) brightness(1.1) drop-shadow(0 0 12px #e67e22); animation: firePulse 1.2s infinite alternate; }
        .skin-cosmos    { filter: hue-rotate(240deg) saturate(3) brightness(0.4) drop-shadow(0 0 15px #6c3483); animation: cosmosPulse 2s infinite alternate; }
        .skin-diamond   { filter: hue-rotate(175deg) saturate(2) brightness(2.0) drop-shadow(0 0 15px #85c1e9); animation: diamondShine 1.8s infinite alternate; }
        .skin-shadow    { filter: grayscale(1) brightness(0.05); animation: shadowPulse 3s infinite alternate; }

        @keyframes gentleBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes wobble { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(-8deg); } 75% { transform: rotate(8deg); } }
        @keyframes snowFloat { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(10deg); } }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        @keyframes nightPulse { 0% { filter: hue-rotate(200deg) saturate(2.5) brightness(0.4); } 100% { filter: hue-rotate(220deg) saturate(3) brightness(0.7) drop-shadow(0 0 15px #1a237e); } }
        @keyframes crystalSpin { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.1); } 100% { transform: rotate(360deg) scale(1); } }
        @keyframes wave { 0%,100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg); } }
        @keyframes steelVibrate { 0%,100% { transform: translate(0,0); } 50% { transform: translate(2px,1px); } }
        @keyframes heartbeat { 0%,100% { transform: scale(1); } 15% { transform: scale(1.15); } 30% { transform: scale(1); } 45% { transform: scale(1.1); } }
        @keyframes metalGlow { 0% { filter: hue-rotate(10deg) sepia(1) saturate(4) brightness(0.75) drop-shadow(0 0 4px #cd7f32); } 100% { filter: hue-rotate(10deg) sepia(1) saturate(4) brightness(1.0) drop-shadow(0 0 16px #cd7f32); } }
        @keyframes silverSpin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
        @keyframes goldPulse { 0% { filter: sepia(1) saturate(15) brightness(1.1) drop-shadow(0 0 6px #ffcc00); transform: scale(1); } 100% { filter: sepia(1) saturate(20) brightness(1.5) drop-shadow(0 0 20px #ffcc00); transform: scale(1.05); } }
        @keyframes emeraldGlow { 0% { filter: hue-rotate(110deg) saturate(5) brightness(0.9) drop-shadow(0 0 4px #2ecc71); } 100% { filter: hue-rotate(110deg) saturate(6) brightness(1.3) drop-shadow(0 0 20px #2ecc71); } }
        @keyframes toxicBubble { 0% { filter: hue-rotate(75deg) saturate(6) brightness(1.2) drop-shadow(0 0 6px #adff2f); transform: scale(1); } 100% { filter: hue-rotate(85deg) saturate(8) brightness(1.6) drop-shadow(0 0 20px #adff2f); transform: scale(1.08); } }
        @keyframes rainbowAnim { 0% { filter: hue-rotate(0deg) saturate(3); } 100% { filter: hue-rotate(360deg) saturate(3); } }
        @keyframes firePulse { 0% { filter: hue-rotate(5deg) saturate(5) brightness(1.0) drop-shadow(0 0 8px #e67e22); } 100% { filter: hue-rotate(15deg) saturate(6) brightness(1.3) drop-shadow(0 0 20px #ff4500); } }
        @keyframes cosmosPulse { 0% { filter: hue-rotate(240deg) saturate(3) brightness(0.35) drop-shadow(0 0 10px #6c3483); } 100% { filter: hue-rotate(260deg) saturate(4) brightness(0.55) drop-shadow(0 0 25px #a569bd); } }
        @keyframes diamondShine { 0% { filter: hue-rotate(175deg) saturate(2) brightness(1.8) drop-shadow(0 0 10px #85c1e9); } 100% { filter: hue-rotate(190deg) saturate(3) brightness(2.4) drop-shadow(0 0 25px #aed6f1); } }
        @keyframes shadowPulse { 0% { filter: grayscale(1) brightness(0.05); } 100% { filter: grayscale(1) brightness(0.12) drop-shadow(0 0 20px #333); } }

        .float {
            position: absolute; color: var(--yellow); font-weight: bold; font-size: 26px;
            pointer-events: none; animation: floatUp 0.8s forwards; z-index: 10;
        }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body>
    <div class="stats-box">
        <div class="vip-badge" id="v-bad">★ VIP xeoni7 x2 ★</div>
        <span class="score-val" id="sc-val">0</span>
        <div class="sub-stats">За клик: +<span id="c-pw">1</span> | В секунду: +<span id="a-pw">0</span></div>
    </div>

    <div id="game-area">
        <img id="banana" src="https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/banana-emoji.png" class="skin-classic" onclick="handleBananaClick(event)">
    </div>

    <button class="btn btn-don" onclick="openDonate()">💜 ПОДДЕРЖАТЬ xeoni7 (VIP X2)</button>
    <button class="btn btn-ads" onclick="watchAdBonus()">📺 БОНУС +100 БАНАНОВ</button>

    <div class="title">Улучшения</div>
    <div class="upg-card">
        <div class="upg-name"><b>💪 Качалка пальцев</b><i id="c-cost">Цена: 15</i></div>
        <button class="buy-btn" onclick="buyUpgrade('click')">КУПИТЬ</button>
    </div>
    <div class="upg-card">
        <div class="upg-name"><b>🤖 Банано-бот</b><i id="a-cost">Цена: 50</i></div>
        <button class="buy-btn" onclick="buyUpgrade('auto')">КУПИТЬ</button>
    </div>

    <div class="title">Скины</div>
    <div class="skin-tabs">
        <button class="skin-tab active" data-cat="all" onclick="filterSkins('all',this)">🍌 Все</button>
        <button class="skin-tab" data-cat="common" onclick="filterSkins('common',this)">⚪ Обычные</button>
        <button class="skin-tab" data-cat="rare" onclick="filterSkins('rare',this)">🔵 Редкие</button>
        <button class="skin-tab" data-cat="epic" onclick="filterSkins('epic',this)">🟣 Эпические</button>
        <button class="skin-tab" data-cat="legendary" onclick="filterSkins('legendary',this)">🌟 Легенды</button>
    </div>
    <div class="skin-grid" id="skin-shop"></div>

<script>
    const DONATE_URL = "https://www.donationalerts.com/r/xeoni7";
    const BANANA_IMG = 'https://raw.githubusercontent.com/greshampopygay-png/banana-clicker/main/banana-emoji.png';

    let game = {
        score: parseFloat(localStorage.getItem('x_sc')) || 0,
        clickPower: parseInt(localStorage.getItem('x_cp')) || 1,
        autoPower: parseInt(localStorage.getItem('x_ap')) || 0,
        clickCost: parseInt(localStorage.getItem('x_cc')) || 15,
        autoCost: parseInt(localStorage.getItem('x_ac')) || 50,
        isVip: localStorage.getItem('x_vip') === 'true',
        ownedSkins: JSON.parse(localStorage.getItem('x_own')) || [0],
        activeSkin: parseInt(localStorage.getItem('x_act')) || 0
    };

    const skinList = [
        { n: "Классик",   p: 0,      cls: "skin-classic",   cat: "common",    emoji: "🍌" },
        { n: "Зелень",    p: 200,    cls: "skin-green",      cat: "common",    emoji: "🟢" },
        { n: "Переспел",  p: 500,    cls: "skin-overripe",   cat: "common",    emoji: "🟤" },
        { n: "Снег",      p: 1000,   cls: "skin-snow",       cat: "common",    emoji: "⚪" },
        { n: "Уголь",     p: 1500,   cls: "skin-coal",       cat: "common",    emoji: "⚫" },
        { n: "Ночь",      p: 3000,   cls: "skin-night",      cat: "rare",      emoji: "🌙" },
        { n: "Аметист",   p: 5000,   cls: "skin-amethyst",   cat: "rare",      emoji: "💜" },
        { n: "Морской",   p: 7000,   cls: "skin-sea",        cat: "rare",      emoji: "🌊" },
        { n: "Лесной",    p: 10000,  cls: "skin-forest",     cat: "rare",      emoji: "🌲" },
        { n: "Стальной",  p: 12000,  cls: "skin-steel",      cat: "rare",      emoji: "🔩" },
        { n: "Малина",    p: 15000,  cls: "skin-raspberry",  cat: "rare",      emoji: "🍓" },
        { n: "Бронза",    p: 25000,  cls: "skin-bronze",     cat: "epic",      emoji: "🥉" },
        { n: "Серебро",   p: 40000,  cls: "skin-silver",     cat: "epic",      emoji: "🥈" },
        { n: "Золото",    p: 60000,  cls: "skin-gold",       cat: "epic",      emoji: "🥇" },
        { n: "Изумруд",   p: 80000,  cls: "skin-emerald",    cat: "epic",      emoji: "💚" },
        { n: "Рубин",     p: 100000, cls: "skin-ruby",       cat: "epic",      emoji: "❤️" },
        { n: "Ядовитый",  p: 120000, cls: "skin-toxic",      cat: "epic",      emoji: "☣️" },
        { n: "Радуга",    p: 200000, cls: "skin-rainbow",    cat: "legendary", emoji: "🌈" },
        { n: "Огненный",  p: 300000, cls: "skin-fire",       cat: "legendary", emoji: "🔥" },
        { n: "Космос",    p: 400000, cls: "skin-cosmos",     cat: "legendary", emoji: "🌌" },
        { n: "Алмаз",     p: 500000, cls: "skin-diamond",    cat: "legendary", emoji: "💎" },
        { n: "Тень",      p: 666000, cls: "skin-shadow",     cat: "legendary", emoji: "🖤" },
    ];

    const rarityLabels = { common: "Обычный", rare: "Редкий", epic: "Эпический", legendary: "Легендарный" };
    let currentFilter = 'all';

    function filterSkins(cat, btn) {
        currentFilter = cat;
        document.querySelectorAll('.skin-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        renderSkins();
    }

    function saveGame() {
        localStorage.setItem('x_sc', game.score);
        localStorage.setItem('x_cp', game.clickPower);
        localStorage.setItem('x_ap', game.autoPower);
        localStorage.setItem('x_cc', game.clickCost);
        localStorage.setItem('x_ac', game.autoCost);
        localStorage.setItem('x_vip', game.isVip);
        localStorage.setItem('x_own', JSON.stringify(game.ownedSkins));
        localStorage.setItem('x_act', game.activeSkin);
    }

    function handleBananaClick(e) {
        let p = game.isVip ? game.clickPower * 2 : game.clickPower;
        game.score += p;
        let f = document.createElement('div');
        f.className = 'float'; f.innerText = '+' + p;
        f.style.left = e.pageX + 'px'; f.style.top = e.pageY + 'px';
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 800);
        updateUI();
    }

    function buyUpgrade(type) {
        if (type === 'click' && game.score >= game.clickCost) {
            game.score -= game.clickCost; game.clickPower++;
            game.clickCost = Math.round(game.clickCost * 1.6);
        } else if (type === 'auto' && game.score >= game.autoCost) {
            game.score -= game.autoCost; game.autoPower++;
            game.autoCost = Math.round(game.autoCost * 1.7);
        }
        updateUI();
    }

    function selectSkin(id) {
        if (game.ownedSkins.includes(id)) {
            game.activeSkin = id;
        } else if (game.score >= skinList[id].p) {
            game.score -= skinList[id].p;
            game.ownedSkins.push(id);
            game.activeSkin = id;
        }
        updateUI();
    }

    function openDonate() {
        window.open(DONATE_URL, "_blank");
        game.isVip = true;
        updateUI();
        alert("xeoni7 благодарит тебя! VIP x2 активирован!");
    }

    function watchAdBonus() {
        window.open("https://omg10.com/4/10948390", "_blank");
        game.score += 100;
        updateUI();
    }

    function renderSkins() {
        let html = '';
        skinList.forEach((s, i) => {
            if (currentFilter !== 'all' && s.cat !== currentFilter) return;
            let owned = game.ownedSkins.includes(i);
            let isActive =
